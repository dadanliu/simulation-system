name: BFF Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  bff-quality-gate:
    name: Lint, test and build BFF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint BFF
        run: pnpm lint:bff

      - name: Test BFF
        run: pnpm test:bff

      - name: Build BFF
        run: pnpm build:bff
